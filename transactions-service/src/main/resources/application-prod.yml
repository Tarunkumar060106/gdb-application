server:
  port: ${PORT:8002}

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
  hikari:
    minimum-idle: 10
    maximum-pool-size: 50

logging:
  level:
    root: WARN
    com.gdb.transactions: INFO

banking:
  limits:
    daily-max-limit: 50000.00
