server:
  port: ${PORT:8000}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8004}
          predicates:
            - Path=/api/v1/auth/**

        - id: users-service
          uri: ${USERS_SERVICE_URL:http://localhost:8003}
          predicates:
            - Path=/api/v1/users/**

        - id: accounts-service
          uri: ${ACCOUNT_SERVICE_URL:http://localhost:8001}
          predicates:
            - Path=/api/v1/accounts/**

        - id: transactions-service
          uri: ${TRANSACTIONS_SERVICE_URL:http://localhost:8002}
          predicates:
            - Path=/api/v1/transactions/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
